# Codemagic CI/CD — Uçan Kafalar iOS build
#
# KURULUM (Apple Developer hesabı hazır olunca, Codemagic arayüzünde):
# 1. codemagic.io → GitHub ile giriş → bu repoyu ekle.
# 2. Teams → Integrations → App Store Connect: bir API key oluşturup bağla
#    (App Store Connect > Users and Access > Integrations > App Store Connect API).
#    Bağlantıya bir isim ver ve aşağıdaki "app_store_connect: auth: integration"
#    bunu otomatik kullanır. (İsim farklıysa integration adını belirt.)
# 3. App Store Connect'te "Uçan Kafalar" uygulamasını oluştur; bundle id:
#    com.ucankafalar.flappybird  (aşağıdakiyle birebir aynı olmalı).
# 4. Bu workflow'u çalıştır → imzalı .ipa üretir ve TestFlight'a yükler.

workflows:
  ios-release:
    name: Uçan Kafalar iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      groups:
        - ios_signing   # CERTIFICATE_PRIVATE_KEY (Kare Kare ile aynı anahtar)
      vars:
        BUNDLE_ID: "com.ucankafalar.flappybird"
    scripts:
      - name: Swift Package Manager'ı kapat (CocoaPods'a zorla)
        script: flutter config --no-enable-swift-package-manager
      - name: Flutter paketleri
        script: flutter pub get
      - name: Kod imzalama (kalıcı anahtarla sertifika + profil)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: IPA derle
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s) / 60)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ANDROID — Google Play için imzalı AAB üretir.
  # KURULUM (Codemagic arayüzünde):
  # 1. Teams/App settings → Code signing identities → Android keystores →
  #    "Generate keystore" ile yeni bir keystore oluştur (ya da yükle).
  #    Referans adını "ucan_kafalar_upload" koy (aşağıdakiyle aynı olmalı).
  # 2. Bu workflow'u çalıştır → build/app/outputs/.../*.aab üretir.
  # 3. Üretilen .aab'yi Google Play Console'a yükle (ilk sürüm için manuel).
  android-release:
    name: Uçan Kafalar Android
    max_build_duration: 60
    # Ücretsiz plan macOS M2 sunuyor; Android build de bu makinede yapılır.
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      android_signing:
        - ucan_kafalar_upload
    scripts:
      - name: Flutter paketleri
        script: flutter pub get
      - name: AAB derle (Google Play için)
        script: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s) / 60))
      - name: APK derle (telefona doğrudan kurmak için test)
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s) / 60))
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/**/mapping.txt
